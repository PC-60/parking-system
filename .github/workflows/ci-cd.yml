name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  # ✅ FRONTEND BUILD
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build React
        run: |
          cd parking_system
          npm install
          npm run build

  # ✅ BACKEND TEST / INSTALL
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          cd Server
          npm install

  # ✅ DEPLOY (YOUR PART — CORRECTLY PLACED)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ✅ IMPORTANT: Build React BEFORE deploy
      - name: Build React frontend
        run: |
          cd parking_system
          npm install
          npm run build
        env:
          CI: false

      # ✅ Trigger Render deployment
      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"