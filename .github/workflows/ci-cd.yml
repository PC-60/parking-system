name: CI/CD — Parking System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test & Lint Frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: Frontend — Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parking_system

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: parking_system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0
        continue-on-error: true

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  # ─────────────────────────────────────────
  # JOB 2: Test Backend
  # ─────────────────────────────────────────
  test-backend:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test --if-present

  # ─────────────────────────────────────────
  # JOB 3: Build Frontend
  # ─────────────────────────────────────────
  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: [test-frontend]
    defaults:
      run:
        working-directory: parking_system

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: parking_system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false  # Prevents treating warnings as errors

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: parking_system/build/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 4: Deploy (runs only on push to main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: parking_system/build/

      # ── Option A: Deploy to a Linux VPS/server via SSH ──
      # Uncomment and configure this block to deploy via SSH.
      # Required secrets: SSH_HOST, SSH_USER, SSH_KEY, SSH_PORT
      #
      # - name: Deploy to server via SSH
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_KEY }}
      #     port: ${{ secrets.SSH_PORT }}
      #     script: |
      #       cd /var/www/parking-system
      #       git pull origin main
      #       cd parking_system && npm ci && npm run build
      #       cd ../Server && npm ci
      #       pm2 restart parking-server || pm2 start server.js --name parking-server

      # ── Option B: Deploy to Render.com ──
      # Add RENDER_DEPLOY_HOOK_URL as a GitHub secret.
      #
       - name: Trigger Render deploy
         run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deployment summary
        run: |
          echo "✅ Build complete and ready for deployment."
          echo "📦 Artifacts uploaded: parking_system/build/"
          echo "🔑 Configure SSH secrets or a deploy hook to enable auto-deploy."
